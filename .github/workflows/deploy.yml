name: CI/CD Pipeline - EduCRM

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/gestion-scolaire:latest .
          docker tag ${{ secrets.DOCKER_USERNAME }}/gestion-scolaire:latest \
            ${{ secrets.DOCKER_USERNAME }}/gestion-scolaire:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/gestion-scolaire:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/gestion-scolaire:${{ github.sha }}

      - name: Deploy container
        run: |
          docker stop gestion-scolaire || true
          docker rm gestion-scolaire || true
          docker run -d \
            --name gestion-scolaire \
            -p 5000:5000 \
            -e FLASK_ENV=production \
            --restart unless-stopped \
            ${{ secrets.DOCKER_USERNAME }}/gestion-scolaire:latest
          echo "✅ Déploiement terminé sur $(date)"
name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gestion-scolaire:latest
            ${{ secrets.DOCKER_USERNAME }}/gestion-scolaire:${{ github.sha }}

      - name: Deploy to Ubuntu VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/gestion-scolaire:latest
            docker stop gestion-scolaire || true
            docker rm gestion-scolaire || true
            docker run -d \
              --name gestion-scolaire \
              -p 5000:5000 \
              -e FLASK_ENV=production \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/gestion-scolaire:latest
            echo "✅ Déploiement terminé sur $(date)"